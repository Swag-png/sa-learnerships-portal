<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Opportunities | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-wrapper {
            min-height: 100vh;
            background-color: #666666;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            background-color: #444444;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid white;
        }

        .navbar h1 {
            color: white;
            font-size: 20px;
            margin: 0;
            cursor: pointer;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-link-btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
            text-transform: uppercase;
        }

        .nav-link-btn:hover {
            background-color: white;
            color: #444;
        }

        .logout-btn {
            background-color: crimson;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
        }

        .logout-btn:hover {
            opacity: 0.85;
        }

        /* LISTINGS AREA */
        .listings-area {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .listings-header {
            color: white;
        }

        .listings-header h2 {
            margin: 0 0 6px;
            font-size: 24px;
            border-left: 5px solid white;
            padding-left: 10px;
        }

        .listings-header p {
            margin: 0;
            color: #ccc;
            font-size: 14px;
            padding-left: 15px;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .listing-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 20px;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .listing-card:hover {
            background-color: #6a6a6a;
            transform: translateY(-2px);
        }

        .provider-name {
            font-size: 12px;
            color: #bbb;
            font-style: normal;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .listing-card h2 {
            margin: 6px 0 10px;
            font-size: 18px;
        }

        .listing-card .description {
            font-size: 14px;
            color: #ccc;
            margin: 0 0 14px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-info {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 10px;
        }

        .meta-info address {
            font-style: normal;
        }

        .price-tag {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
            font-size: 15px;
            color: #7dd3fc;
        }

        .error-msg {
            color: #f87171;
            text-align: center;
            margin-top: 40px;
        }

        .empty-msg {
            color: #ccc;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">

        <!-- NAVBAR -->
        <nav class="navbar">
            <h1 id="brandTitle" onclick="goToDashboard()">SkillsConnect</h1>
            <div class="navbar-right">
                <button class="nav-link-btn" id="dashboardBtn" onclick="goToDashboard()">🏠 Dashboard</button>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </nav>

        <!-- LISTINGS AREA -->
        <div class="listings-area">
            <div class="listings-header">
                <h2>Available Opportunities</h2>
                <p>Learnerships, internships and apprenticeships across South Africa</p>
            </div>

            <div id="listings-grid" class="listings-grid">
                <p class="empty-msg">Loading opportunities...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { auth } from "./firebase.js";

        // ── Determine dashboard URL by role ─────────────────────────────────────
        function getDashboardUrl(role) {
            if (!role) return "/";
            const r = role.toLowerCase();
            if (r === "applicant") return "/applicant-home";
            if (r === "provider")  return "/provider-home";
            if (r === "admin")     return "/admin-dashboard";
            return "/";
        }

        window.goToDashboard = function() {
            const role = localStorage.getItem("userRole");
            window.location.href = getDashboardUrl(role);
        };

        // ── Auth guard & role detection ─────────────────────────────────────────
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "/";
                return;
            }

            const idTokenResult = await user.getIdTokenResult();
            const role = idTokenResult.claims.role;
            if (role) localStorage.setItem("userRole", role);
        });

        // ── Logout ──────────────────────────────────────────────────────────────
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try { await auth.signOut(); } catch (e) { console.error(e); }
            localStorage.clear();
            window.location.href = "/";
        });

        // ── Fetch and render listings ───────────────────────────────────────────
        async function fetchListings() {
            const token = localStorage.getItem("token");
            const container = document.getElementById("listings-grid");

            try {
                const response = await fetch("/api/listings", {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (response.ok) {
                    const listings = await response.json();
                    renderListings(listings);
                } else if (response.status === 401 || response.status === 403) {
                    container.innerHTML = `<p class="error-msg">Session expired. Please <a href="/" style="color:#7dd3fc;">log in again</a>.</p>`;
                } else {
                    container.innerHTML = `<p class="error-msg">Could not load opportunities.</p>`;
                }
            } catch (err) {
                container.innerHTML = `<p class="error-msg">Error loading data. Check your connection.</p>`;
            }
        }

        function renderListings(data) {
            const container = document.getElementById("listings-grid");

            if (!data || data.length === 0) {
                container.innerHTML = "<p class='empty-msg'>No opportunities found.</p>";
                return;
            }

            container.innerHTML = data.map(item => `
                <article class="listing-card" data-id="${item.id}">
                    <cite class="provider-name">${item.provider || "Unknown Provider"}</cite>
                    <h2>${item.title || "Untitled"}</h2>
                    <p class="description">${item.description || "No description available."}</p>
                    <div class="meta-info">
                        <address>📍 ${item.location || "Location not specified"}</address>
                        <small>🏷 ${item.type || "Type not specified"}</small>
                    </div>
                    <div class="price-tag">
                        <strong>Stipend: R${item.price ?? "N/A"}</strong>
                    </div>
                </article>
            `).join("");

            // Attach click listeners
            document.querySelectorAll(".listing-card").forEach(card => {
                card.addEventListener("click", () => {
                    const listingID = card.dataset.id;
                    window.location.href = `/listing-info?listingID=${listingID}`;
                });
            });
        }

        fetchListings();
    </script>
</body>
</html>
