<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard - SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-wrapper {
            min-height: 100vh;
            background-color: #666666;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            background-color: #444444;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid white;
        }

        .navbar h1 {
            color: white;
            font-size: 20px;
            margin: 0;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-size: 14px;
        }

        .logout-btn {
            background-color: crimson;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
        }

        .logout-btn:hover {
            opacity: 0.85;
            background-color: crimson;
            color: white;
        }

        /* MAIN CONTENT */
        .dashboard-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* WELCOME CARD */
        .welcome-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px;
            color: white;
        }

        .welcome-card h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }

        .welcome-card p {
            margin: 0;
            color: #ccc;
            font-size: 14px;
        }

        /* INFO CARDS ROW */
        .cards-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .info-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .info-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #ccc;
            text-transform: uppercase;
        }

        .info-card p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* STATUS BADGE */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-verified {
            background-color: green;
            color: white;
        }

        .badge-pending {
            background-color: orange;
            color: white;
        }

        /* PROFILE SECTION */
        .profile-section {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px;
            color: white;
        }

        .profile-section h2 {
            margin: 0 0 20px 0;
            border-left: 5px solid white;
            padding-left: 10px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-field label {
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            margin: 0;
        }

        .profile-field p {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">

        <!-- NAVBAR -->
        <nav class="navbar">
            <h1>SkillsConnect</h1>
            <div class="navbar-right">
                <span id="navName"></span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="dashboard-content">

            <!-- WELCOME -->
            <div class="welcome-card">
                <h2 id="welcomeMsg">Welcome 👋</h2>
                <p>Provider Dashboard</p>
            </div>

            <!-- INFO CARDS -->
            <div class="cards-row">
                <div class="info-card">
                    <h3>Status</h3>
                    <p id="cardStatus">-</p>
                </div>
                <div class="info-card">
                    <h3>Verified</h3>
                    <p id="cardVerified">-</p>
                </div>
                <div class="info-card">
                    <h3>Location</h3>
                    <p id="cardLocation">-</p>
                </div>
            </div>

            <!-- PROFILE -->
            <div class="profile-section">
                <h2>Provider Profile</h2>
                <div class="profile-grid">
                    <div class="profile-field">
                        <label>Provider Name</label>
                        <p id="profileName">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Email</label>
                        <p id="profileEmail">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Provider ID</label>
                        <p id="profileProviderId">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Location</label>
                        <p id="profileLocation">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Status</label>
                        <p id="profileStatus">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Verified</label>
                        <p id="profileVerified">-</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ── PROTECT PAGE ────────────────────────────
        const sessionToken = localStorage.getItem("sessionToken");
        const email        = localStorage.getItem("userEmail");
        const name         = localStorage.getItem("userName");
        const role         = localStorage.getItem("userRole");
        const status       = localStorage.getItem("userStatus")     || "-";
        const location     = localStorage.getItem("userLocation")   || "-";
        const verified     = localStorage.getItem("userVerified")   || "false";
        const providerId   = localStorage.getItem("userProviderId") || "-";

        if (!sessionToken) {
            alert("You must log in first!");
            window.location.href = "index.html";
        }

        // ── DISPLAY USER DATA ───────────────────────
        const displayName = name || email || "Provider";

        document.getElementById("navName").innerText         = displayName;
        document.getElementById("welcomeMsg").innerText      = "Welcome, " + displayName + " 👋";
        document.getElementById("cardStatus").innerText      = status;
        document.getElementById("cardLocation").innerText    = location;
        document.getElementById("cardVerified").innerText    = verified === "true" ? "✓ Verified" : "✗ Not Verified";
        document.getElementById("profileName").innerText     = name       || "-";
        document.getElementById("profileEmail").innerText    = email      || "-";
        document.getElementById("profileProviderId").innerText = providerId;
        document.getElementById("profileLocation").innerText = location;
        document.getElementById("profileStatus").innerText   = status;
        document.getElementById("profileVerified").innerText = verified === "true" ? "✓ Verified" : "✗ Not Verified";

        // ── LOGOUT ──────────────────────────────────
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try {
                await fetch("http://localhost:3000/logout", {
                    method:  "POST",
                    headers: { "Authorization": sessionToken }
                });
            } catch (error) {
                console.error("Logout error:", error);
            }
            localStorage.clear();
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
