<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard - SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-wrapper {
            min-height: 100vh;
            background-color: #666666;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            background-color: #444444;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid white;
        }

        .navbar h1 {
            color: white;
            font-size: 20px;
            margin: 0;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-size: 14px;
        }

        .nav-link-btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
            text-transform: uppercase;
        }

        .nav-link-btn:hover {
            background-color: white;
            color: #444;
        }

        .logout-btn {
            background-color: crimson;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
        }

        .logout-btn:hover {
            opacity: 0.85;
            background-color: crimson;
            color: white;
        }

        /* MAIN CONTENT */
        .dashboard-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* WELCOME CARD */
        .welcome-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px;
            color: white;
        }

        .welcome-card h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }

        .welcome-card p {
            margin: 0;
            color: #ccc;
            font-size: 14px;
        }

        /* QUICK ACTIONS */
        .quick-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 20px 28px;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            min-width: 180px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: white;
            color: #333;
        }

        .action-btn .btn-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }

        /* INFO CARDS ROW */
        .cards-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .info-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .info-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #ccc;
            text-transform: uppercase;
        }

        .info-card p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* STATUS BADGE */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-verified   { background-color: green;  color: white; }
        .badge-pending    { background-color: orange; color: white; }

        /* PROFILE SECTION */
        .profile-section {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px;
            color: white;
        }

        .profile-section h2 {
            margin: 0 0 20px 0;
            border-left: 5px solid white;
            padding-left: 10px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-field label {
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            margin: 0;
        }

        .profile-field p {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
        }

        .loading-indicator {
            color: #ccc;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">

        <!-- NAVBAR -->
        <nav class="navbar">
            <h1>SkillsConnect</h1>
            <div class="navbar-right">
                <button class="nav-link-btn" onclick="window.location.href='/create-opportunity'">➕ Post Opportunity</button>
                <span id="navName"></span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="dashboard-content">

            <!-- WELCOME -->
            <div class="welcome-card">
                <h2 id="welcomeMsg">Welcome 👋</h2>
                <p>Provider Dashboard — manage your opportunities and applicants</p>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="quick-actions">
                <button class="action-btn" onclick="window.location.href='/create-opportunity'">
                    <span class="btn-icon">➕</span>Post New Opportunity
                </button>
                
                <button class="action-btn" id="myListingsBtn">
                    <span class="btn-icon">🏢</span>My Listings
                </button>
            </div>

            <!-- INFO CARDS -->
            <div class="cards-row">
                <div class="info-card">
                    <h3>Status</h3>
                    <p id="cardStatus">-</p>
                </div>
                <div class="info-card">
                    <h3>Verified</h3>
                    <p id="cardVerified">-</p>
                </div>
                <div class="info-card">
                    <h3>Location</h3>
                    <p id="cardLocation">-</p>
                </div>
            </div>

            <!-- PROFILE -->
            <div class="profile-section">
                <h2>Provider Profile</h2>
                <div class="profile-grid">
                    <div class="profile-field">
                        <label>Organization Name</label>
                        <p id="profileName" class="loading-indicator">Loading...</p>
                    </div>
                    <div class="profile-field">
                        <label>Email</label>
                        <p id="profileEmail" class="loading-indicator">Loading...</p>
                    </div>
                    <div class="profile-field">
                        <label>Username</label>
                        <p id="profileUsername">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Phone</label>
                        <p id="profilePhone">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Location</label>
                        <p id="profileLocation">-</p>
                    </div>
                    <div class="profile-field">
                        <label>Verified</label>
                        <p id="profileVerified">-</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";

        const token = localStorage.getItem("token");

        if (!token) {
            alert("You must log in first!");
            window.location.href = "/";
        }

        // ── Load profile from Firestore via backend ─────────────────────────────
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "/";
                return;
            }

            try {
                const freshToken = await user.getIdToken();
                const res = await fetch(`/api/user-profile?uid=${user.uid}`, {
                    headers: { "Authorization": `Bearer ${freshToken}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    populateProfile(data, user.email);
                } else {
                    populateProfile({}, user.email);
                }
            } catch (err) {
                console.error("Profile fetch error:", err);
                populateProfile({}, user.email);
            }
        });

        function populateProfile(data, authEmail) {
            // Providers use 'organization' as their name
            const orgName   = data.organization || data.firstname || "-";
            const email     = data.email        || authEmail      || "-";
            const username  = data.username     || "-";
            const phone     = data.phonenumber  || "-";
            const city      = data.city         || "-";
            const verified  = data.verified     || false;
            const status    = data.status       || "active";

            document.getElementById("navName").innerText        = orgName !== "-" ? orgName : email;
            document.getElementById("welcomeMsg").innerText     = "Welcome, " + (orgName !== "-" ? orgName : email) + " 👋";
            document.getElementById("cardStatus").innerText     = status;
            document.getElementById("cardLocation").innerText   = city;
            document.getElementById("cardVerified").innerText   = verified ? "✓ Verified" : "✗ Not Verified";
            document.getElementById("profileName").innerText    = orgName;
            document.getElementById("profileEmail").innerText   = email;
            document.getElementById("profileUsername").innerText= username;
            document.getElementById("profilePhone").innerText   = phone;
            document.getElementById("profileLocation").innerText= city;
            document.getElementById("profileVerified").innerText= verified ? "✓ Verified" : "✗ Not Verified";
        }

        // ── Logout ──────────────────────────────────────────────────────────────
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try { await auth.signOut(); } catch (e) { console.error(e); }
            localStorage.clear();
            window.location.href = "/";
        });

        document.getElementById("myListingsBtn").addEventListener("click", () => {
            window.location.href = "/applicants";
        });
    </script>
</body>
</html>
