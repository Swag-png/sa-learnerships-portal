<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body> 
        <section class="wrapper">
        <form id="loginForm">
            <img src="SkillsConnect Logo 2.PNG" /> 
            <h2 class="login-heading">Login</h2>
            <h4>New? <a href="signup.html">Sign up</a></h4>

            <label>Email Address:</label>
            <input type="email" id="emailInput" name="email" />

            <label>Password:</label>
            <input type="password" id="passwordInput" name="password" />

            <a href="forgotPassword.html">Forgot your password?</a>

            <!-- error message -->
            <p id="errorMsg" style="color:red; display:none;"></p>

            <section class="form-divider">
                <p style="text-align: center;">Or</p>
            </section>

            <section class="form-bottom">
                <section class="form-socials">
                    <button type="button" class="form-btn form-btn--social" id="googleBtn">
                        <img src="google.svg" class="btn-icon" alt="Google" />
                    </button>
                    <button type="button" class="form-btn form-btn--social" id="githubBtn">
                        <img src="github.svg" class="btn-icon" alt="GitHub" />
                    </button>
                    <button type="button" class="form-btn form-btn--social" id="facebookBtn">
                        <img src="facebook.svg" class="btn-icon" alt="Facebook" />
                    </button>
                </section>
                <section>
                    <button type="submit" class="login">Login</button>
                </section>
            </section>

        </form>
        </section>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
        <script src="auth.js"></script>
    </body>
</html>
