<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body> 
        <section class="wrapper">
            
        <form>
            <img src="SkillsConnect Logo 2.PNG" /> 
            <h2 class="login-heading" >Login</h2>
            <h4>New? <a href="signup.html">Sign up</a></h4>
            <label>Username or Email Adress:</label>
            <input type="text" name="username"></input>
            <label>Password:</label>
            <input type="password" name="password"></input>
            <a href="forgotPassword.html">Forgot your password?</a>

            <section class="form-divider">
                <p style="text-align: center;">Or</p>
            </section>

            <section class="form-bottom">
                <section class="form-socials">
                    <button type="button" id="google-login-btn" class="form-btn form-btn--social">
                        <img src="google.svg" class="btn-icon" alt="Google login">
                    </button>
                    <button class="">
                        <img src="apple.svg" class="btn-icon" alt="social icon">
                    </button>
                    <button class="form-btn form-btn--social">
                        <img src="facebook.svg" class="btn-icon" alt="social icon">
                    </button>
            </section>
           <section>
            <button type="submit" class="login">Login</button>
        </form>
        </section>
        <script type="module" src="login.js"></script>
        <script type="module" src="/login-email.js"></script>
        </body>
       
        
</html>
