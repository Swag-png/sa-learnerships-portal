name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      # ── Mocha: Access Control Tests ──────────────────────────────────────────
      - name: Run Mocha access control tests
        run: npx mocha tests/control-access.test.js --timeout 10000
        env:
          NODE_ENV: test

      # ── Jest: All other tests with coverage ──────────────────────────────────
      - name: Run Jest tests with coverage
        run: npx jest --testPathPattern="tests/__tests__" --coverage --coverageThreshold='{"global":{"lines":50}}' --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      # ── Upload coverage report as artifact ───────────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/